<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>IM Flow · 선교 캘린더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  if(window.tailwind) tailwind.config={ theme:{ extend:{
    colors:{ brand:{50:'#eef4ff',100:'#d9e6ff',200:'#bcd3ff',300:'#8eb6ff',400:'#598dff',500:'#3b6bf6',600:'#244eeb',700:'#1d3dd8',800:'#1e34af',900:'#1e328a'} },
    fontFamily:{ sans:['Pretendard','-apple-system','system-ui','sans-serif'] } } } };
</script>
<style>body{font-family:'Pretendard',-apple-system,system-ui,sans-serif}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-900">
<div id="app"></div><div id="modal-root"></div>
<script>
(function(){
  'use strict';
  var SUPABASE_URL='https://bbfvnmlrdtzmcwfadjqw.supabase.co';
  var SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJiZnZubWxyZHR6bWN3ZmFkanF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1Njg1OTIsImV4cCI6MjA5ODE0NDU5Mn0.nJbRfTkcjVxsb_BO6sAP_0lOxQ--wTFXVN9tBH1IPNA';
  if(!window.supabase){ document.getElementById('app').innerHTML='<p style="padding:40px;text-align:center">인터넷 연결을 확인하고 새로고침하세요.</p>'; return; }
  var sb=window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  var PRIORITIES={none:{label:'보통',chip:''},important:{label:'중요',chip:'bg-amber-50 text-amber-600'},urgent:{label:'급함',chip:'bg-red-50 text-red-600'}};
  var P_RANK={urgent:0,important:1,none:2};
  var RECURS={none:'주기 없음',daily:'매일',weekly:'매주',monthly:'매월'};
  var WD=['일','월','화','수','목','금','토'];

  var session=null, profile=null, tasks=[], projects=[];
  var state={ date:'', cat:'all', listMode:'day', calMonth:'', projectId:null };
  var viewUser=null, viewProfile=null, readonly=false, dirData=null, busy=false;

  // ── 날짜 ──
  function pad(n){return (n<10?'0':'')+n;}
  function fmtD(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function todayStr(){return fmtD(new Date());}
  function addDaysS(s,n){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()+n);return fmtD(d);}
  function daysBetween(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);}
  function addMonthsS(s,n){var d=new Date(s+'T00:00:00');var day=d.getDate();d.setDate(1);d.setMonth(d.getMonth()+n);var last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();d.setDate(Math.min(day,last));return fmtD(d);}
  function startOfWeek(s){var d=new Date(s+'T00:00:00');d.setDate(d.getDate()-d.getDay());return fmtD(d);}
  function weekDates(s){var st=startOfWeek(s),o=[];for(var i=0;i<7;i++)o.push(addDaysS(st,i));return o;}
  function monthMatrix(a){var d=new Date(a+'T00:00:00'),y=d.getFullYear(),m=d.getMonth();var first=new Date(y,m,1);var cur=new Date(y,m,1-first.getDay());var weeks=[];for(var w=0;w<6;w++){var row=[];for(var i=0;i<7;i++){row.push(fmtD(cur));cur.setDate(cur.getDate()+1);}weeks.push(row);}return {y:y,m:m,weeks:weeks};}
  function wd(s){return WD[new Date(s+'T00:00:00').getDay()];}
  function dd(s){return new Date(s+'T00:00:00').getDate();}
  function mm(s){return new Date(s+'T00:00:00').getMonth()+1;}
  function fmtKDay(s){var d=new Date(s+'T00:00:00');var lbl=d.getFullYear()+'. '+(d.getMonth()+1)+'. '+d.getDate()+' ('+WD[d.getDay()]+')';if(s===todayStr())lbl='오늘 · '+lbl;else if(s===addDaysS(todayStr(),-1))lbl='어제 · '+lbl;else if(s===addDaysS(todayStr(),1))lbl='내일 · '+lbl;return lbl;}
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function byId(id){return tasks.filter(function(t){return t.id===id;})[0];}
  function cats(){var s={};tasks.forEach(function(t){if(t.category)s[t.category]=1;});return Object.keys(s).sort();}
  function catOk(t){return state.cat==='all'||t.category===state.cat;}
  function onDate(s){return tasks.filter(function(t){return t.due===s&&catOk(t);}).sort(sortItems);}
  function overdueList(){return tasks.filter(function(t){return t.due&&t.due<todayStr()&&!t.done&&catOk(t);}).sort(function(a,b){return a.due.localeCompare(b.due)||sortItems(a,b);});}
  function sortItems(a,b){if(a.done!==b.done)return a.done?1:-1;return P_RANK[a.priority]-P_RANK[b.priority];}

  function icon(n,c){c=c||'h-4 w-4';var p={
    plus:'<path d="M12 5v14M5 12h14"/>',check:'<path d="M20 6L9 17l-5-5"/>',trash:'<path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/>',
    flag:'<path d="M4 21V4h13l-2 4 2 4H4"/>',repeat:'<path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/>',
    day:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>',
    week:'<rect x="3" y="4" width="18" height="7" rx="1"/><path d="M3 14h18M8 4v16M16 4v16"/>',
    month:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
    alert:'<path d="M12 9v4M12 17h.01M10.3 3.9l-8 14A2 2 0 004 21h16a2 2 0 001.7-3l-8-14a2 2 0 00-3.4 0z"/>',tag:'<path d="M20 10l-8 8-9-9V3h6z"/><circle cx="7" cy="7" r="1.5"/>',
    left:'<path d="M15 18l-6-6 6-6"/>',right:'<path d="M9 6l6 6-6 6"/>',users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.9M16 3.1a4 4 0 010 7.8"/>',logout:'<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>',pull:'<path d="M12 5v14M19 12l-7 7-7-7"/>',folder:'<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>',back:'<path d="M15 18l-6-6 6-6"/>'};
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="'+c+'">'+(p[n]||'')+'</svg>';}

  // ── 부팅 ──
  sb.auth.onAuthStateChange(function(_e,s){session=s;if(!s){profile=null;viewUser=null;}route();});
  sb.auth.getSession().then(function(r){session=r.data.session;route();});
  function route(){ state.date=state.date||todayStr(); state.calMonth=state.calMonth||todayStr(); if(!session){renderLogin();return;} ensureProfile().then(function(){ if(profile.role==='director'&&viewUser===null) showDirectorHome(); else showSelf(); }); }
  async function ensureProfile(){ var r=await sb.from('mf_profiles').select('*').eq('id',session.user.id).maybeSingle(); if(r.data){profile=r.data;return;} var name=(session.user.email||'').split('@')[0]; var ins=await sb.from('mf_profiles').insert({id:session.user.id,name:name,branch:'',role:'missionary'}).select().single(); profile=ins.data||{id:session.user.id,name:name,role:'missionary'}; }

  async function loadTasks(uid){
    var r=await sb.from('mf_tasks').select('*').eq('user_id',uid).order('due',{ascending:true}); tasks=r.data||[];
    var p=await sb.from('mf_projects').select('*').eq('owner_id',uid).order('created_at',{ascending:false}); projects=p.data||[];
  }
  function projById(id){return projects.filter(function(p){return p.id===id;})[0];}
  function projTasks(pid){return tasks.filter(function(t){return t.project_id===pid;});}
  function projProgress(pid){var ts=projTasks(pid);var done=ts.filter(function(t){return t.done;}).length;return {done:done,total:ts.length,pct:ts.length?Math.round(done/ts.length*100):0};}
  async function showSelf(){ readonly=false;viewUser=session.user.id;viewProfile=profile;busy=true;renderApp();await loadTasks(viewUser);busy=false;renderApp(); }
  async function showMissionary(uid,pr){ readonly=true;viewUser=uid;viewProfile=pr;state.listMode='day';state.date=todayStr();state.calMonth=todayStr();state.cat='all';busy=true;renderApp();await loadTasks(uid);busy=false;renderApp(); }
  async function showDirectorHome(){ viewUser=null;busy=true;renderDirectorHome();var pr=await sb.from('mf_profiles').select('*');var tk=await sb.from('mf_tasks').select('user_id,due,done');dirData={profiles:pr.data||[],tasks:tk.data||[]};busy=false;renderDirectorHome(); }

  // ── CRUD ──
  async function addTask(f){ var row={user_id:session.user.id,title:f.title,due:f.due||state.date,horizon:'today',category:f.category||'',area:f.area||'',priority:f.priority||'none',recur:f.recur||'none',project_id:f.project||null,done:false,carry:0}; var r=await sb.from('mf_tasks').insert(row).select().single(); if(r.data){tasks.push(r.data);renderApp();} else alert('저장 실패: '+(r.error&&r.error.message)); }
  async function addProject(f){ var row={owner_id:session.user.id,name:f.name,description:f.description||'',deadline:f.deadline||null,status:'active'}; var r=await sb.from('mf_projects').insert(row).select().single(); if(r.data){projects.unshift(r.data);renderApp();} else alert('프로젝트 저장 실패: '+(r.error&&r.error.message)); }
  async function updateProject(id,f){ var p=projById(id); if(p)for(var k in f)p[k]=f[k]; renderApp(); await sb.from('mf_projects').update(f).eq('id',id); }
  async function delProject(id){ projects=projects.filter(function(p){return p.id!==id;}); tasks.forEach(function(t){if(t.project_id===id)t.project_id=null;}); state.listMode='projects';state.projectId=null; renderApp(); await sb.from('mf_projects').delete().eq('id',id); }
  async function updateTask(id,f){ var t=byId(id); if(t)for(var k in f)t[k]=f[k]; renderApp(); await sb.from('mf_tasks').update(f).eq('id',id); }
  async function toggleTask(id){ var t=byId(id); if(!t)return; var nd=!t.done; t.done=nd; t.done_date=nd?todayStr():null;
    if(nd&&t.recur!=='none'&&t.due){ var nx=t.recur==='daily'?addDaysS(t.due,1):t.recur==='weekly'?addDaysS(t.due,7):addMonthsS(t.due,1); var nr={user_id:session.user.id,title:t.title,due:nx,horizon:'today',category:t.category,area:t.area,priority:t.priority,recur:t.recur,project_id:t.project_id||null,done:false,carry:0}; var ir=await sb.from('mf_tasks').insert(nr).select().single(); if(ir.data)tasks.push(ir.data); }
    renderApp(); await sb.from('mf_tasks').update({done:nd,done_date:t.done_date}).eq('id',id); }
  async function delTask(id){ tasks=tasks.filter(function(t){return t.id!==id;}); renderApp(); await sb.from('mf_tasks').delete().eq('id',id); }
  async function seedCloud(){ var T=todayStr(); var uid=session.user.id;
    var prj=await sb.from('mf_projects').insert({owner_id:uid,name:'중간고사 준비',description:'출제 · 인쇄 · 채점까지',deadline:addDaysS(T,10),status:'active'}).select().single();
    var pid=prj.data?prj.data.id:null; if(prj.data)projects.unshift(prj.data);
    var S=[['1교시 영어 수업',T,'교육사역','수업관리','daily','important',false,null],['학생 상담 (이OO)',T,'교육사역','학생관리','none','none',false,null],['출석부 정리',T,'교육사역','교육행정','none','urgent',false,null],['조회 시간',T,'교육사역','학생관리','daily','none',true,null],
      ['성적 입력 (지난주분)',addDaysS(T,-1),'교육사역','교육행정','none','none',false,null],['교재 복사',addDaysS(T,-2),'교육사역','수업관리','none','none',false,null],
      ['학부모 상담',addDaysS(T,1),'교육사역','학생관리','none','important',false,null],['중간고사 문제 출제',addDaysS(T,2),'교육사역','학사일정','none','none',false,pid],['중간고사 인쇄 의뢰',addDaysS(T,4),'교육사역','교육행정','none','none',false,pid],['온택 수업 준비',addDaysS(T,3),'전략선교','온택','none','none',false,null]]
      .map(function(a){return {user_id:uid,title:a[0],due:a[1],horizon:'today',category:a[2],area:a[3],recur:a[4],priority:a[5],done:a[6],done_date:a[6]?T:null,project_id:a[7],carry:0};});
    var r=await sb.from('mf_tasks').insert(S).select(); if(r.data){tasks=tasks.concat(r.data);renderApp();} else alert('예시 넣기 실패: '+(r.error&&r.error.message||'')); }

  // ── 로그인 ──
  function renderLogin(){ document.getElementById('app').innerHTML=
    '<div class="flex min-h-screen items-center justify-center px-4"><div class="w-full max-w-sm">'+
      '<div class="mb-6 text-center"><span class="mx-auto mb-3 flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-600 text-white">'+icon('month','h-6 w-6')+'</span><h1 class="text-xl font-bold">IM Flow · 선교 캘린더</h1><p class="mt-1 text-sm text-slate-500">로그인하면 어디서든 이어서 관리돼요.</p></div>'+
      '<div class="space-y-3 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">'+
        '<div><label class="mb-1 block text-sm font-medium text-slate-700">이메일</label><input id="li-email" type="email" autocomplete="username" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>'+
        '<div><label class="mb-1 block text-sm font-medium text-slate-700">비밀번호</label><input id="li-pw" type="password" autocomplete="current-password" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>'+
        '<p id="li-msg" class="hidden rounded-lg bg-red-50 px-3 py-2 text-sm text-red-600"></p>'+
        '<div class="flex gap-2 pt-1"><button id="li-signup" class="flex-1 rounded-lg border border-slate-300 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50">회원가입</button><button id="li-login" class="flex-1 rounded-lg bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-700">로그인</button></div>'+
      '</div></div></div>';
    document.getElementById('li-login').onclick=doLogin; document.getElementById('li-signup').onclick=doSignup; }
  function liMsg(m){var e=document.getElementById('li-msg');e.textContent=m;e.classList.remove('hidden');}
  function liCreds(){return {email:document.getElementById('li-email').value.trim(),password:document.getElementById('li-pw').value};}
  async function doLogin(){var c=liCreds();if(!c.email||!c.password){liMsg('이메일과 비밀번호를 입력하세요.');return;}var r=await sb.auth.signInWithPassword(c);if(r.error)liMsg('로그인 실패: '+r.error.message);}
  async function doSignup(){var c=liCreds();if(!c.email||!c.password){liMsg('이메일과 비밀번호를 입력하세요.');return;}var r=await sb.auth.signUp(c);if(r.error){liMsg('회원가입 실패: '+r.error.message);return;}if(!r.data.session)liMsg('가입됨. 이메일 인증이 켜져 있으면 인증 후 로그인하세요.');}

  // ── 사이드바 ──
  function sidebar(){
    var who=viewProfile?esc(viewProfile.name||viewProfile.id.slice(0,6)):'';
    var head='<div class="px-3 py-3"><div class="flex items-center gap-2"><span class="flex h-8 w-8 items-center justify-center rounded-lg bg-brand-600 text-white">'+icon('month','h-5 w-5')+'</span><span class="text-base font-bold">IM Flow</span></div>'+
      '<div class="mt-2 flex items-center justify-between rounded-lg bg-slate-50 px-2 py-1.5 text-xs"><span class="truncate text-slate-600">'+(readonly?'👁 '+who+' (열람)':'👤 '+who)+'</span>'+
      (profile&&profile.role==='director'?'<button data-act="dirhome" class="ml-2 shrink-0 font-semibold text-brand-600">디렉터</button>':'<button data-act="logout" class="ml-2 shrink-0 text-slate-400 hover:text-red-500">'+icon('logout','h-3.5 w-3.5')+'</button>')+'</div></div>';
    var over=overdueList().length;
    function nav(act,label,ic,active,badge){return '<button data-act="'+act+'" class="flex items-center gap-2 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition md:w-full '+(active?'bg-brand-600 text-white':'text-slate-600 hover:bg-slate-100')+'">'+icon(ic,'h-4 w-4 shrink-0')+'<span>'+label+'</span>'+(badge?'<span class="ml-auto rounded-full px-1.5 py-0.5 text-[10px] font-bold '+(active?'bg-white/25 text-white':'bg-red-100 text-red-600')+'">'+badge+'</span>':'')+'</button>';}
    var isToday=state.listMode==='day'&&state.date===todayStr();
    var inProj=state.listMode==='projects'||state.listMode==='project';
    var modes=nav('todaysel','오늘','day',isToday)+nav('overdue','밀린 일','alert',state.listMode==='overdue',over||'')+nav('projects','프로젝트','folder',inProj);
    var cs=cats();
    function ci(cat,label){var a=state.cat===cat;return '<button data-act="cat" data-cat="'+esc(cat)+'" class="flex items-center gap-2 whitespace-nowrap rounded-lg px-3 py-1.5 text-sm transition md:w-full '+(a?'bg-slate-800 text-white':'text-slate-500 hover:bg-slate-100')+'">'+(cat==='all'?'':icon('tag','h-3.5 w-3.5'))+'<span>'+esc(label)+'</span></button>';}
    var catNav=cs.length?'<div class="hidden px-3 pt-3 pb-1 text-[11px] font-semibold uppercase tracking-wide text-slate-400 md:block">업무</div>'+ci('all','전체')+cs.map(function(c){return ci(c,c);}).join(''):'';
    return '<aside class="border-b border-slate-200 bg-white md:w-56 md:shrink-0 md:border-b-0 md:border-r">'+head+'<nav class="flex gap-1 overflow-x-auto p-2 md:flex-col md:gap-0.5 md:overflow-visible md:p-3">'+modes+catNav+'</nav></aside>';
  }

  // ── 할일 행 ──
  function chips(t){var out=[];
    if(t.priority&&t.priority!=='none')out.push('<span class="inline-flex items-center gap-1 rounded-md px-1.5 py-0.5 text-[11px] font-medium '+PRIORITIES[t.priority].chip+'">'+icon('flag','h-3 w-3')+PRIORITIES[t.priority].label+'</span>');
    if(t.recur&&t.recur!=='none')out.push('<span class="inline-flex items-center gap-1 rounded-md bg-slate-100 px-1.5 py-0.5 text-[11px] font-medium text-slate-500">'+icon('repeat','h-3 w-3')+RECURS[t.recur]+'</span>');
    if(t.project_id){var pp=projById(t.project_id);if(pp)out.push('<span class="inline-flex items-center gap-1 rounded-md bg-indigo-50 px-1.5 py-0.5 text-[11px] font-medium text-indigo-600">'+icon('folder','h-3 w-3')+esc(pp.name)+'</span>');}
    if(t.category)out.push('<span class="inline-flex items-center gap-1 rounded-md bg-brand-50 px-1.5 py-0.5 text-[11px] font-medium text-brand-600">'+icon('tag','h-3 w-3')+esc(t.category)+(t.area?' · '+esc(t.area):'')+'</span>');
    if(!out.length)return '';return '<div class="mt-1.5 flex flex-wrap items-center gap-1 pl-7">'+out.join('')+'</div>';}
  function taskRow(t,opt){opt=opt||{};var od=!t.done&&t.due&&t.due<todayStr();
    var drag=readonly?'':' draggable="true" data-drag-id="'+t.id+'"';
    var box='<div'+drag+' class="group rounded-lg border '+(od?'border-red-200 bg-red-50/40':'border-slate-200 bg-white')+' px-2.5 py-2'+(readonly?'':' cursor-grab active:cursor-grabbing')+'"><div class="flex items-center gap-2">';
    if(readonly)box+='<span class="flex h-5 w-5 shrink-0 items-center justify-center rounded-md border '+(t.done?'border-emerald-500 bg-emerald-500 text-white':'border-slate-300 text-transparent')+'">'+icon('check','h-3.5 w-3.5')+'</span><span class="flex-1 text-sm '+(t.done?'text-slate-400 line-through':'text-slate-700')+'">'+esc(t.title)+'</span>';

    else{ var T=todayStr(); var byU={}; dirData.tasks.forEach(function(t){(byU[t.user_id]=byU[t.user_id]||[]).push(t);});
      var ms=dirData.profiles.filter(function(p){return p.role!=='director'||byU[p.id];});
      body+='<p class="mb-4 text-sm text-slate-500">선교사별 현황이에요. 카드를 누르면 그 선교사의 캘린더를 볼 수 있어요.</p>';
      if(!ms.length)body+='<div class="rounded-2xl border border-dashed border-slate-300 bg-white py-14 text-center text-sm text-slate-400">아직 등록된 선교사가 없어요.</div>';
      body+='<div class="grid grid-cols-1 gap-3 sm:grid-cols-2">';
      ms.forEach(function(p){ var ts=byU[p.id]||[]; var todayLeft=ts.filter(function(t){return t.due===T&&!t.done;}).length; var over=ts.filter(function(t){return t.due&&t.due<T&&!t.done;}).length; var doneN=ts.filter(function(t){return t.done;}).length;
        body+='<button data-act="viewuser" data-uid="'+p.id+'" data-name="'+esc(p.name||'')+'" class="rounded-2xl border border-slate-200 bg-white p-4 text-left shadow-sm transition hover:border-brand-200 hover:shadow-md"><div class="flex items-center justify-between"><span class="font-semibold text-slate-800">'+esc(p.name||'(이름없음)')+'</span>'+(p.branch?'<span class="text-[11px] text-slate-400">'+esc(p.branch)+'</span>':'')+'</div><div class="mt-3 flex gap-4 text-sm"><span class="text-slate-600">오늘 <b class="text-brand-600">'+todayLeft+'</b></span><span class="text-slate-600">밀림 <b class="'+(over?'text-red-600':'text-slate-400')+'">'+over+'</b></span><span class="text-slate-600">완료 <b class="text-emerald-600">'+doneN+'</b></span></div></button>';
      });
      body+='</div>'; }
    app.innerHTML=head+body+'</main>';
  }

  // ── 모달 ──
  function openTaskModal(id){
    var t=id?byId(id):{id:'',title:'',due:state.date,category:(state.cat!=='all'?state.cat:''),area:'',priority:'none',recur:'none',project_id:(state.listMode==='project'?state.projectId:null)};
    if(id&&!t)return; var isNew=!id; var root=document.getElementById('modal-root');
    root.innerHTML='<div data-act="mbg" class="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/40 sm:items-center sm:p-4"><div data-stop="1" class="w-full max-w-md rounded-t-2xl bg-white p-6 shadow-xl sm:rounded-2xl">'+
      '<div class="mb-4 flex items-center justify-between"><h2 class="text-lg font-bold">'+(isNew?'새 할 일':'할 일')+'</h2><button data-act="mclose" class="rounded-lg p-1 text-slate-400 hover:bg-slate-100">✕</button></div>'+
      '<form id="task-form" class="space-y-4">'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">할 일</label><input name="title" required maxlength="200" value="'+esc(t.title)+'" placeholder="예) 학생 상담" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>'+
        '<div class="grid grid-cols-2 gap-3"><div><label class="mb-1.5 block text-sm font-medium text-slate-700">날짜</label><input name="due" type="date" value="'+esc(t.due)+'" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500" /></div>'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">주기</label><select name="recur" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500"><option value="none"'+(t.recur==='none'?' selected':'')+'>주기 없음</option><option value="daily"'+(t.recur==='daily'?' selected':'')+'>매일</option><option value="weekly"'+(t.recur==='weekly'?' selected':'')+'>매주</option><option value="monthly"'+(t.recur==='monthly'?' selected':'')+'>매월</option></select></div></div>'+
        '<div class="grid grid-cols-2 gap-3"><div><label class="mb-1.5 block text-sm font-medium text-slate-700">업무(대분류)</label><input name="category" list="cat-list" maxlength="24" value="'+esc(t.category)+'" placeholder="예) 교육사역" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500" /><datalist id="cat-list">'+cats().map(function(c){return '<option value="'+esc(c)+'">';}).join('')+'</datalist></div>'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">세부영역</label><input name="area" maxlength="24" value="'+esc(t.area)+'" placeholder="예) 수업관리" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500" /></div></div>'+
        '<div class="grid grid-cols-2 gap-3"><div><label class="mb-1.5 block text-sm font-medium text-slate-700">우선순위</label><select name="priority" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500"><option value="none"'+(t.priority==='none'?' selected':'')+'>보통</option><option value="important"'+(t.priority==='important'?' selected':'')+'>중요</option><option value="urgent"'+(t.priority==='urgent'?' selected':'')+'>급함</option></select></div>'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">프로젝트</label><select name="project" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500"><option value=""'+(!t.project_id?' selected':'')+'>없음</option>'+projects.map(function(pp){return '<option value="'+pp.id+'"'+(t.project_id===pp.id?' selected':'')+'>'+esc(pp.name)+'</option>';}).join('')+'</select></div></div>'+
        '<div class="flex gap-2 pt-1">'+(isNew?'':'<button type="button" data-act="del-modal" data-id="'+t.id+'" class="rounded-lg border border-red-200 px-3 py-2.5 text-sm font-medium text-red-500 hover:bg-red-50">삭제</button>')+'<button type="submit" class="flex-1 rounded-lg bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-700">'+(isNew?'추가':'저장')+'</button></div>'+
      '</form></div></div>';
    var i=root.querySelector('input[name=title]');if(i)i.focus();
    root.querySelector('#task-form').addEventListener('submit',function(e){e.preventDefault();var f=e.target;var title=f.title.value.trim();if(!title)return;var payload={title:title,due:f.due.value||state.date,category:f.category.value.trim(),area:f.area.value.trim(),priority:f.priority.value,recur:f.recur.value,project_id:(f.project.value||null)};if(isNew){payload.project=payload.project_id;addTask(payload);}else updateTask(t.id,{title:payload.title,due:payload.due,category:payload.category,area:payload.area,priority:payload.priority,recur:payload.recur,project_id:payload.project_id});closeModal();});
  }
  function closeModal(){document.getElementById('modal-root').innerHTML='';}
  function openProjectModal(id){
    var p=id?projById(id):{id:'',name:'',description:'',deadline:''}; if(id&&!p)return; var isNew=!id;
    var root=document.getElementById('modal-root');
    root.innerHTML='<div data-act="mbg" class="fixed inset-0 z-50 flex items-end justify-center bg-slate-900/40 sm:items-center sm:p-4"><div data-stop="1" class="w-full max-w-md rounded-t-2xl bg-white p-6 shadow-xl sm:rounded-2xl">'+
      '<div class="mb-4 flex items-center justify-between"><h2 class="text-lg font-bold">'+(isNew?'새 프로젝트':'프로젝트 수정')+'</h2><button data-act="mclose" class="rounded-lg p-1 text-slate-400 hover:bg-slate-100">✕</button></div>'+
      '<form id="proj-form" class="space-y-4">'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">프로젝트 이름</label><input name="name" required maxlength="100" value="'+esc(p.name)+'" placeholder="예) 케이푸드 6호점 오픈" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-100" /></div>'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">설명</label><textarea name="description" rows="2" maxlength="500" class="w-full resize-none rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500">'+esc(p.description)+'</textarea></div>'+
        '<div><label class="mb-1.5 block text-sm font-medium text-slate-700">마감일</label><input name="deadline" type="date" value="'+esc(p.deadline||'')+'" class="w-full rounded-lg border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-brand-500" /></div>'+
        '<div class="flex gap-2 pt-1">'+(isNew?'':'<button type="button" data-act="delproj-modal" data-pid="'+p.id+'" class="rounded-lg border border-red-200 px-3 py-2.5 text-sm font-medium text-red-500 hover:bg-red-50">삭제</button>')+'<button type="submit" class="flex-1 rounded-lg bg-brand-600 py-2.5 text-sm font-semibold text-white hover:bg-brand-700">'+(isNew?'만들기':'저장')+'</button></div>'+
      '</form></div></div>';
    var i=root.querySelector('input[name=name]');if(i)i.focus();
    root.querySelector('#proj-form').addEventListener('submit',function(e){e.preventDefault();var f=e.target;var name=f.name.value.trim();if(!name)return;var payload={name:name,description:f.description.value.trim(),deadline:f.deadline.value||null};if(isNew)addProject(payload);else updateProject(p.id,payload);closeModal();});
  }

  // ── 이벤트 ──
  document.addEventListener('click',function(e){
    var el=e.target.closest('[data-act]');if(!el)return;var act=el.getAttribute('data-act');
    if(act==='cat'){state.cat=el.getAttribute('data-cat');renderApp();}
    else if(act==='prev'||act==='next'){state.calMonth=addMonthsS(state.calMonth,act==='next'?1:-1);renderApp();}
    else if(act==='todaysel'){state.date=todayStr();state.calMonth=todayStr();state.listMode='day';renderApp();}
    else if(act==='overdue'){state.listMode='overdue';renderApp();}
    else if(act==='projects'){state.listMode='projects';state.projectId=null;renderApp();}
    else if(act==='openproj'){state.listMode='project';state.projectId=el.getAttribute('data-pid');renderApp();}
    else if(act==='projback'){state.listMode='projects';state.projectId=null;renderApp();}
    else if(act==='newproj'){openProjectModal(null);}
    else if(act==='editproj'){openProjectModal(el.getAttribute('data-pid'));}
    else if(act==='delproj-modal'){if(confirm('이 프로젝트를 삭제할까요? (할일은 남고 프로젝트 연결만 해제돼요)')){delProject(el.getAttribute('data-pid'));closeModal();}}
    else if(act==='goday'){state.date=el.getAttribute('data-date');state.calMonth=el.getAttribute('data-date');state.listMode='day';renderApp();}
    else if(act==='newfull'){openTaskModal(null);}
    else if(act==='edit'){openTaskModal(el.getAttribute('data-id'));}
    else if(act==='toggle'){toggleTask(el.getAttribute('data-id'));}
    else if(act==='del'){delTask(el.getAttribute('data-id'));}
    else if(act==='del-modal'){delTask(el.getAttribute('data-id'));closeModal();}
    else if(act==='pull'){updateTask(el.getAttribute('data-id'),{due:todayStr()});}
    else if(act==='seed'){seedCloud();}
    else if(act==='logout'){sb.auth.signOut();}
    else if(act==='dirhome'){showDirectorHome();}
    else if(act==='myown'){showSelf();}
    else if(act==='viewuser'){showMissionary(el.getAttribute('data-uid'),{id:el.getAttribute('data-uid'),name:el.getAttribute('data-name')});}
    else if(act==='mclose'){closeModal();}
    else if(act==='mbg'){if(!e.target.closest('[data-stop]'))closeModal();}
  });
  document.addEventListener('submit',function(e){
    var qa=e.target.closest('#quickadd');if(qa){e.preventDefault();var v=qa.q.value.trim();if(!v)return;addTask({title:v,due:state.date});qa.q.value='';return;}
    var pa=e.target.closest('#projadd');if(pa){e.preventDefault();var pv=pa.q.value.trim();if(!pv)return;addTask({title:pv,due:todayStr(),project:pa.getAttribute('data-pid')});pa.q.value='';}
  });

  // 드래그 앤 드롭: 할일을 캘린더 날짜로 옮기기
  var draggedId=null;
  function clearDropHL(){ var els=document.querySelectorAll('.mf-drop'); for(var i=0;i<els.length;i++){ els[i].classList.remove('mf-drop','ring-2','ring-brand-500','ring-inset'); } }
  document.addEventListener('dragstart',function(e){ var row=e.target.closest('[data-drag-id]'); if(!row){draggedId=null;return;} draggedId=row.getAttribute('data-drag-id'); if(e.dataTransfer){e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',draggedId);}catch(_){} } });
  document.addEventListener('dragover',function(e){ if(!draggedId)return; var cell=e.target.closest('[data-act="goday"]'); if(cell){ e.preventDefault(); if(e.dataTransfer)e.dataTransfer.dropEffect='move'; if(!cell.classList.contains('mf-drop')){ clearDropHL(); cell.classList.add('mf-drop','ring-2','ring-brand-500','ring-inset'); } } });
  document.addEventListener('drop',function(e){ if(!draggedId)return; var cell=e.target.closest('[data-act="goday"]'); if(!cell)return; e.preventDefault(); var date=cell.getAttribute('data-date'); var id=draggedId; draggedId=null; clearDropHL(); var t=byId(id); if(t&&t.due!==date) updateTask(id,{due:date}); });
  document.addEventListener('dragend',function(){ draggedId=null; clearDropHL(); });
})();
</script>
</body>
</html>
